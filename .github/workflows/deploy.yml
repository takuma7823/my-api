name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/234180312284/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@terraform-practice-494215.iam.gserviceaccount.com

      - name: Configure Docker
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev

      - name: Build and Push Docker image
        run: |
          docker build --platform linux/amd64 \
            -t asia-northeast1-docker.pkg.dev/terraform-practice-494215/my-api/my-api:latest .
          docker push asia-northeast1-docker.pkg.dev/terraform-practice-494215/my-api/my-api:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy my-api \
            --image asia-northeast1-docker.pkg.dev/terraform-practice-494215/my-api/my-api:latest \
            --region asia-northeast1 \
            --project terraform-practice-494215